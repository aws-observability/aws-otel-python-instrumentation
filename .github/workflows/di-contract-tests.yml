name: DI Debugger Contract Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - "release/v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo @ SHA - ${{ github.sha }}
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #5.0.0
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: '3.11'
      - name: Build distro wheel
        run: |
          pip install --upgrade pip setuptools wheel packaging build
          rm -rf ./dist/*
          cd ./aws-opentelemetry-distro
          python -m build --outdir ../dist
      - name: Upload distro wheel
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4.6.2
        with:
          name: distro-wheel
          path: dist/aws_opentelemetry_distro-*-py3-none-any.whl
          retention-days: 1

  di-contract-tests:
    runs-on: ubuntu-latest
    needs: build-wheel
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        suite: ["django", "fastapi", "flask"]
      fail-fast: false

    steps:
      - name: Checkout Repo @ SHA - ${{ github.sha }}
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 #3.11.1

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: '3.12'

      - name: Download distro wheel
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 #v5.0.0
        with:
          name: distro-wheel
          path: dist

      - name: Set up di-${{ matrix.suite }} image (python ${{ matrix.python-version }})
        env:
          CACHE_BACKEND: gha
        run: bash scripts/set-up-contract-tests.sh "${{ matrix.python-version }}" di-${{ matrix.suite }}

      - name: Run di-${{ matrix.suite }} contract tests
        run: pytest contract-tests/tests/test/amazon/di/${{ matrix.suite }}_test.py -v
