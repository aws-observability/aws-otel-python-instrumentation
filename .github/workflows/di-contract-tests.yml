name: DI Debugger Contract Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - "release/v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  di-contract-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        # One framework per job: each builds only its di-<suite> image and runs only that test file,
        # so the 78 DI tests (each gated on a fixed ~15s debugger-poll wait) run in parallel.
        suite: ["django", "fastapi", "flask"]
      fail-fast: false

    steps:
      - name: Checkout Repo @ SHA - ${{ github.sha }}
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 #3.11.1

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: '3.12'

      # Build the universal distro wheel that the DI application images install.
      - name: Build distro wheel
        run: |
          pip install --upgrade pip setuptools wheel packaging build
          rm -rf ./dist/*
          cd ./aws-opentelemetry-distro
          python -m build --outdir ../dist

      # Build only this suite's DI application image, at the matrix Python version (genuine
      # per-version coverage), with layer caching. The operator image is not needed by contract tests.
      - name: Set up di-${{ matrix.suite }} image (python ${{ matrix.python-version }})
        env:
          CACHE_BACKEND: gha
        run: bash scripts/set-up-contract-tests.sh "${{ matrix.python-version }}" di-${{ matrix.suite }}

      - name: Run di-${{ matrix.suite }} contract tests
        run: pytest contract-tests/tests/test/amazon/di/${{ matrix.suite }}_test.py -v
