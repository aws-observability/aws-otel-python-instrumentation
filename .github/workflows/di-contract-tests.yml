name: DI Debugger Contract Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - "release/v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  di-contract-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout Repo @ SHA - ${{ github.sha }}
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 #3.11.1

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: '3.12'

      # Build the universal distro wheel that the DI application images install.
      - name: Build distro wheel
        run: |
          pip install --upgrade pip setuptools wheel packaging build
          rm -rf ./dist/*
          cd ./aws-opentelemetry-distro
          python -m build --outdir ../dist

      # Build only the DI application images, at the matrix Python version (genuine per-version
      # coverage), with layer caching. The operator image is not needed by contract tests.
      - name: Build DI images (python ${{ matrix.python-version }})
        env:
          CACHE_BACKEND: gha
        run: bash scripts/build-contract-test-images.sh "${{ matrix.python-version }}" di

      - name: Set up and run DI contract tests
        run: |
          bash scripts/run-contract-tests.sh
          pytest contract-tests/tests/test/amazon/di/ -v
