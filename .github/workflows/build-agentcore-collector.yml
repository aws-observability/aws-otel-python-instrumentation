name: Build AgentCore Runtime Collector

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
  workflow_call:

jobs:
  check-for-changes:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      latest_sha: ${{ steps.check.outputs.latest_sha }}
    steps:
      - name: Check for new commits
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_SHA=$(gh api repos/wangzlei/opentelemetry-collector-contrib/commits/aws-cwa-dev --jq '.sha')
          LAST_SHA=$(gh variable get LAST_CODE_SHA 2>/dev/null || echo "")

          echo "Latest SHA: $LATEST_SHA"
          echo "Last SHA: $LAST_SHA"

          if [ "$LATEST_SHA" != "$LAST_SHA" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Build triggered (new commit or manual dispatch)"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            gh variable set LAST_CODE_SHA --body "$LATEST_SHA"
          else
            echo "No change."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

          echo "latest_sha=$LATEST_SHA" >> "$GITHUB_OUTPUT"

  build-collector:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code repo
        uses: actions/checkout@v4
        with:
          repository: wangzlei/opentelemetry-collector-contrib
          ref: ${{ needs.check-for-changes.outputs.latest_sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build otelcol-agentcore for linux/arm64
        run: |
          GOOS=linux GOARCH=arm64 make otelcol-agentcore

      - name: Upload collector binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: otelcol-agentcore-linux-arm64
          path: bin/otelcol-agentcore_linux_arm64

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ASSUME_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload collector binary to S3
        run: |
          aws s3 cp bin/otelcol-agentcore_linux_arm64 s3://${{ secrets.STAGING_BUCKET_NAME }}/otelcol-agentcore_linux_arm64
