name: Python Instrumentation PR Build
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
    branches:
      - main
      - "release/v*"

permissions:
  id-token: write
  contents: read

env:
  USER: ${{ github.event.pull_request.user.login }}
  LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}

jobs:
  static-code-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #5.0.0
        with:
          fetch-depth: 0

      # This action wrapper by raven-actions provides cross-platform support and caching
      # Catches the same issues as GitHub's web editor: syntax errors, type mismatches,
      # undefined inputs/secrets, circular dependencies, and more
      # Note: actionlint cannot validate composite actions - see https://github.com/rhysd/actionlint/issues/350
      - name: Validate GitHub Actions workflows
        if: always()
        uses: raven-actions/actionlint@e01d1ea33dd6a5ed517d95b4c0c357560ac6f518 # v2.1.1
        with:
          files: .github/workflows/*.yml
          # Temporarily ignore specific shellcheck codes while we systematically fix them
          # SC2027: The surrounding quotes actually unquote this
          # SC2086: Double quote to prevent globbing and word splitting
          # SC2129: Consider using { cmd1; cmd2; } >> file instead of individual redirects
          # SC2162: read without -r will mangle backslashes
          # SC2206: Quote to prevent word splitting/globbing, or split robustly with mapfile or read -a
          flags: |
            -ignore SC2027
            -ignore SC2086
            -ignore SC2129
            -ignore SC2162
            -ignore SC2206
          
      - name: Check CHANGELOG
        if: always()
        run: |
          # Check if PR is from workflows bot or dependabot
          if [[ "${{ env.USER }}" == "aws-application-signals-bot" ]]; then
            echo "Skipping check: PR from aws-application-signals-bot"
            exit 0
          fi
          
          if [[ "${{ env.USER }}" == "dependabot[bot]" ]]; then
            echo "Skipping check: PR from dependabot"
            exit 0
          fi
          
          # Check for skip changelog label
          if echo '${{ env.LABELS }}' | jq -r '.[]' | grep -q "skip changelog"; then
            echo "Skipping check: skip changelog label found"
            exit 0
          fi
          
          # Fetch base branch and check for CHANGELOG modifications
          git fetch origin ${{ github.base_ref }}
          if git diff --name-only origin/${{ github.base_ref }}..HEAD | grep -q "CHANGELOG.md"; then
            echo "CHANGELOG.md entry found - check passed"
            exit 0
          fi
          
          echo "It looks like you didn't add an entry to CHANGELOG.md. If this change affects the SDK behavior, please update CHANGELOG.md and link this PR in your entry. If this PR does not need a CHANGELOG entry, you can add the 'Skip Changelog' label to this PR."
          exit 1

      - name: Check for versioned GitHub actions
        if: always()
        run: |
          # Get changed GitHub workflow/action files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}..HEAD | grep -E "^\.github/(workflows|actions)/.*\.ya?ml$" || true)
          
          if [ -n "$CHANGED_FILES" ]; then
            # Check for any versioned actions, excluding comments and this validation script
            VIOLATIONS=$(grep -Hn "uses:.*@v" $CHANGED_FILES | grep -v "grep.*uses:.*@v" | grep -v "#.*@v" || true)
            if [ -n "$VIOLATIONS" ]; then
              echo "Found versioned GitHub actions. Use commit SHAs instead:"
              echo "$VIOLATIONS"
              exit 1
            fi
          fi
          
          echo "No versioned actions found in changed files"

      - name: Check for github.event in run steps
        if: always()
        run: |
          # Get changed GitHub workflow/action files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}..HEAD | grep -E "^\.github/(workflows|actions)/.*\.ya?ml$" || true)
          
          if [ -n "$CHANGED_FILES" ]; then
            VIOLATIONS=""
            for file in $CHANGED_FILES; do
              # Extract all 'run' step values excluding this validation step
              RUN_STEPS=$(yq eval '.. | select(has("run") and has("name") and .name != "Check for github.event in run steps") | .run' "$file" 2>/dev/null || echo "")
              if echo "$RUN_STEPS" | grep -q "github\.event\."; then
                VIOLATIONS="$VIOLATIONS$file: Contains github.event.* in run step\n"
              fi
            done
            
            if [ -n "$VIOLATIONS" ]; then
              echo -e "Found github.event.* usage in run steps. This can lead to script injection vulnerabilities:"
              echo -e "$VIOLATIONS"
              exit 1
            fi
          fi
          
          echo "No github.event usage found in run steps"

  # Unit tests are the only part of the old `build` matrix that genuinely varies by Python
  # version, so they get the full 3.10-3.14 matrix here. No Docker, no wheel, no contract tests.
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # ensures the entire test matrix is run, even if one permutation fails
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout Repo @ SHA - ${{ github.sha }}
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #5.0.0

      - name: Set up and run unit tests
        uses: ./.github/actions/set_up
        with:
          python_version: ${{ matrix.python-version }}
          package_name: aws-opentelemetry-distro
          os: ubuntu-latest
          run_unit_tests: true

  # Build the universal (py3-none-any) distro wheel exactly once and share it with the contract
  # shards, which COPY it into their application images. The wheel does not vary by Python version.
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo @ SHA - ${{ github.sha }}
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #5.0.0
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: '3.11'
      - name: Build distro wheel
        run: |
          pip install --upgrade pip setuptools wheel packaging build
          rm -rf ./dist/*
          cd ./aws-opentelemetry-distro
          python -m build --outdir ../dist
      - name: Upload distro wheel
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4.6.2
        with:
          name: distro-wheel
          path: dist/aws_opentelemetry_distro-*-py3-none-any.whl
          retention-days: 1

  # Build the operator image (root Dockerfile) once and scan it. The base and the Rust cp-utility
  # are Python-version independent, and contract tests do not use this image, so it is decoupled
  # from the contract path. Layer caching (in the action) keeps the slow Rust stage warm across runs.
  operator-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo @ SHA - ${{ github.sha }}
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #5.0.0

      - name: Build and scan operator image
        uses: ./.github/actions/artifacts_build
        with:
          image_uri_with_tag: pr-build/operator
          push_image: false
          load_image: true
          python_version: "3.11"
          package_name: aws-opentelemetry-distro
          os: ubuntu-latest
          run_unit_tests: false
          trivyignore-file: .github/trivy/pr-build.trivyignore.yaml
          platforms: linux/amd64

  # Contract tests, sharded by suite and run against the exact Python version each cell claims.
  # Each cell builds only its shard's application images (layer-cached per app+version) on its
  # matrix python-version. The host that runs pytest stays on a fixed Python (it only talks to the
  # containers over the network), avoiding host-side install issues on newer interpreters.
  # DI is intentionally NOT here -- it runs solely in di-contract-tests.yml to avoid duplication.
  contract-tests:
    runs-on: ubuntu-latest
    needs: build-wheel
    strategy:
      fail-fast: false # ensures the entire test matrix is run, even if one permutation fails
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        shard:
          - name: botocore
            targets: botocore
            paths: contract-tests/tests/test/amazon/botocore
          - name: requests
            targets: requests
            paths: contract-tests/tests/test/amazon/requests
          - name: web
            targets: django requests
            paths: contract-tests/tests/test/amazon/django contract-tests/tests/test/amazon/misc contract-tests/tests/test/amazon/runtime
          - name: db-pure
            targets: pymysql mysqlclient
            paths: contract-tests/tests/test/amazon/pymysql contract-tests/tests/test/amazon/mysqlclient
          - name: db-native
            targets: psycopg2 mysql-connector
            paths: contract-tests/tests/test/amazon/psycopg2 contract-tests/tests/test/amazon/mysql-connector
          - name: gen_ai
            targets: langchain llamaindex
            paths: contract-tests/tests/test/amazon/gen_ai/langchain contract-tests/tests/test/amazon/gen_ai/llamaindex
          - name: crewai
            targets: crewai
            paths: contract-tests/tests/test/amazon/gen_ai/crewai
          - name: serviceevents-asgi
            targets: serviceevents-flask serviceevents-fastapi
            paths: contract-tests/tests/test/amazon/serviceevents/flask_test.py contract-tests/tests/test/amazon/serviceevents/fastapi_test.py
          - name: serviceevents-web
            targets: serviceevents-django serviceevents-django-uwsgi
            paths: contract-tests/tests/test/amazon/serviceevents/django_test.py contract-tests/tests/test/amazon/serviceevents/django_uwsgi_test.py
        # Skip (shard, python) combinations whose pinned framework deps don't support the version.
        exclude:
          # django==5.1.14 officially caps at Python 3.13.
          - { shard: { name: web }, python-version: "3.14" }
          # django==5.1.14 cap + uwsgi C build lags new CPython.
          - { shard: { name: serviceevents-web }, python-version: "3.14" }
          # psycopg2==2.9.9 (<2.9.10) and mysql-connector~=9.1.0 lack new-CPython builds/wheels.
          - { shard: { name: db-native }, python-version: "3.13" }
          - { shard: { name: db-native }, python-version: "3.14" }
          # crewai does not support Python 3.14 yet (mirrors tox.ini).
          - { shard: { name: crewai }, python-version: "3.14" }
    steps:
      - name: Checkout Repo @ SHA - ${{ github.sha }}
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #5.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 #3.11.1

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: '3.12'

      - name: Download distro wheel
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 #v5.0.0
        with:
          name: distro-wheel
          path: dist

      - name: Build ${{ matrix.shard.name }} images (python ${{ matrix.python-version }})
        env:
          CACHE_BACKEND: gha
        run: bash scripts/build-contract-test-images.sh "${{ matrix.python-version }}" ${{ matrix.shard.targets }}

      - name: Run ${{ matrix.shard.name }} contract tests
        run: |
          bash scripts/run-contract-tests.sh
          pytest ${{ matrix.shard.paths }} -v

  build-lambda:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo @ SHA - ${{ github.sha }}
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #5.0.0
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: '3.x'
      - name: Build sample lambda function
        working-directory: lambda-layer/sample-apps
        run: ./package-lambda-function.sh
      - name: Build layers
        working-directory: lambda-layer/src
        run: |
          ./build-lambda-layer.sh
          pip install tox
          tox

  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # ensures the entire test matrix is run, even if one permutation fails
      matrix:
        tox-environment: ["spellcheck", "lint"]
    steps:
      - name: Checkout Repo @ SHA - ${{ github.sha }}
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #5.0.0

      - name: Install libsnappy-dev
        if: ${{ matrix.tox-environment == 'lint' }}
        run: sudo apt-get update && sudo apt-get install -y libsnappy-dev

      - name: Set up
        uses: ./.github/actions/set_up
        with:
          python_version: 3.11
          package_name: aws-opentelemetry-distro
          os: ubuntu-latest
          run_unit_tests: false

      - name: Run ${{ matrix.tox-environment }} with tox
        run: tox -e ${{ matrix.tox-environment }}

  spotless:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo @ SHA - ${{ github.sha }}
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #5.0.0

      - name: Gradle validation
        uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a #4.4.3

      - name: Set up Java
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 #v5.0.0
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a #4.4.3

      - name: Build with Gradle
        run: cd performance-tests; ./gradlew spotlessCheck

  all-pr-checks-pass:
    runs-on: ubuntu-latest
    needs: [static-code-checks, lint, spotless, unit-test, build-wheel, operator-image, contract-tests, build-lambda]
    if: always()
    steps:
      - name: Checkout to get workflow file
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #5.0.0
      
      - name: Check all jobs succeeded and none missing
        run: |
          # Check if all needed jobs succeeded
          results='${{ toJSON(needs) }}'
          if echo "$results" | jq -r '.[] | .result' | grep -v success; then
            echo "Some jobs failed"
            exit 1
          fi
          
          # Extract all job names from workflow (excluding this gate job)
          all_jobs=$(yq eval '.jobs | keys | .[]' .github/workflows/pr-build.yml | grep -v "all-pr-checks-pass" | sort)
          
          # Extract job names from needs array
          needed_jobs='${{ toJSON(needs) }}'
          needs_list=$(echo "$needed_jobs" | jq -r 'keys[]' | sort)
          
          # Check if any jobs are missing from needs
          missing_jobs=$(comm -23 <(echo "$all_jobs") <(echo "$needs_list"))
          if [ -n "$missing_jobs" ]; then
            echo "ERROR: Jobs missing from needs array in all-pr-checks-pass:"
            echo "$missing_jobs"
            echo "Please add these jobs to the needs array of all-pr-checks-pass"
            exit 1
          fi
          
          echo "All checks passed and no jobs missing from gate!"
