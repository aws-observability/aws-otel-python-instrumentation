name: ServiceEvents Contract Tests

on:
  # Run on demand. The serviceevents contract tests are also exercised on every PR
  # via pr-build.yml (`pytest contract-tests/tests`); this standalone workflow lets
  # maintainers run just the serviceevents suite (or `all`) against a chosen ref.
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Which contract tests to run'
        required: false
        type: choice
        default: serviceevents
        options:
          - serviceevents
          - all

permissions:
  id-token: write
  contents: read

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo @ SHA - ${{ github.sha }}
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #5.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 #3.11.1

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: '3.12'

      # Build the universal distro wheel that the application images install.
      - name: Build distro wheel
        run: |
          pip install --upgrade pip setuptools wheel packaging build
          rm -rf ./dist/*
          cd ./aws-opentelemetry-distro
          python -m build --outdir ../dist

      # Build only the images the chosen scope needs (the serviceevents group, or every image for
      # `all` by passing no app names), with layer caching. The empty python version arg keeps each
      # Dockerfile's default base.
      - name: Set up images and host
        env:
          CACHE_BACKEND: gha
        run: |
          if [ "${{ inputs.test_scope }}" = "all" ]; then
            bash scripts/set-up-contract-tests.sh ""
          else
            bash scripts/set-up-contract-tests.sh "" serviceevents
          fi

      - name: Run contract tests with pytest
        run: |
          if [ "${{ inputs.test_scope }}" = "all" ]; then
            pytest contract-tests/tests -v
          else
            pytest contract-tests/tests/test/amazon/serviceevents/ -v
          fi
