[tox]
isolated_build = True
skipsdist = True
skip_missing_interpreters = True
envlist =
    ; aws-opentelemetry-distro
    3.{9,10,11,12,13,14}-test-aws-opentelemetry-distro
    3.{10,11,12,13,14}-test-aws-opentelemetry-distro-langchain
    ; crewai does not support Python 3.14 yet
    3.{10,11,12,13}-test-aws-opentelemetry-distro-crewai
    3.{10,11,12,13,14}-test-aws-opentelemetry-distro-llama-index
    3.{10,11,12,13,14}-test-aws-opentelemetry-distro-mcp
    3.{10,11,12,13,14}-test-aws-opentelemetry-distro-openai-agents
    ; intentionally excluded from pypy3 since we use grpc in aws-opentelemetry-distro, but pypy3 doesn't support grpc

    lint
    spellcheck

[testenv]
deps =
  -c dev-requirements.txt
  test: pytest
  test: coverage
  test: jsonschema
  test: fastapi
  test: starlette
  test: flask
  test: django
  test: httpx

setenv =
  CORE_REPO=git+https://github.com/open-telemetry/opentelemetry-python.git@release/v1.40.x-0.61bx
  CONTRIB_REPO=git+https://github.com/open-telemetry/opentelemetry-python-contrib.git@release/v1.40.x-0.61bx
  COVERAGE_FILE={toxinidir}/.coverage
  COVERAGE_RUN=coverage run --parallel --source={envsitepackagesdir}/amazon --rcfile={toxinidir}/.coveragerc
  ; Enable coverage collection in subprocesses spawned during tests.
  ; Works with parallel=true in .coveragerc so each process writes a separate data file.
  COVERAGE_PROCESS_START={toxinidir}/.coveragerc

changedir =
  test-aws-opentelemetry-distro: aws-opentelemetry-distro/tests

commands_pre =
; Install without -e to test the actual installation
  3.{9,10,11,12,13,14}: python -m pip install -U pip setuptools wheel
; Install common packages for all the tests. These are not needed in all the
; cases but it saves a lot of boilerplate in this file.
  test: pip install botocore
  test: pip install opentelemetry-api[test]@{env:CORE_REPO}\#egg=opentelemetry-api&subdirectory=opentelemetry-api
  test: pip install opentelemetry-sdk[test]@{env:CORE_REPO}\#egg=opentelemetry-sdk&subdirectory=opentelemetry-sdk
  test: pip install opentelemetry-instrumentation[test]@{env:CONTRIB_REPO}\#egg=opentelemetry-instrumentation&subdirectory=opentelemetry-instrumentation
  test: pip install opentelemetry-exporter-otlp[test]@{env:CORE_REPO}\#egg=opentelemetry-exporter-otlp&subdirectory=exporter/opentelemetry-exporter-otlp
  test: pip install opentelemetry-test-utils@{env:CORE_REPO}\#egg=opentelemetry-test-utils&subdirectory=tests/opentelemetry-test-utils
  aws-opentelemetry-distro: pip install {toxinidir}/aws-opentelemetry-distro

commands =
  test-aws-opentelemetry-distro: {env:COVERAGE_RUN} -m pytest amazon/opentelemetry/distro/ \
    --ignore=amazon/opentelemetry/distro/instrumentation/langchain \
    --ignore=amazon/opentelemetry/distro/instrumentation/crewai \
    --ignore=amazon/opentelemetry/distro/instrumentation/llama_index \
    --ignore=amazon/opentelemetry/distro/instrumentation/mcp \
    --ignore=amazon/opentelemetry/distro/instrumentation/openai_agents \
    -ra {posargs}

[testenv:3.{10,11,12,13,14}-test-aws-opentelemetry-distro-langchain]
deps =
  {[testenv]deps}
  langchain >= 0.3.21, < 2
  langchain-classic
  langchain-aws
  langchain-openai
  langchain-anthropic
  langchain-google-genai
  langchain-google-vertexai
  langchain-mistralai
  langchain-groq
  langchain-cohere
  langchain-deepseek
  langchain-xai
changedir = {[testenv]changedir}
commands =
  {env:COVERAGE_RUN} -m pytest amazon/opentelemetry/distro/instrumentation/langchain -ra {posargs}

[testenv:3.{10,11,12,13}-test-aws-opentelemetry-distro-crewai]
deps =
  {[testenv]deps}
  crewai[litellm,anthropic,bedrock,azure-ai-inference,google-genai] >= 1.9.0, < 2
changedir = {[testenv]changedir}
commands_pre =
  {[testenv]commands_pre}
  ; TODO: remove once https://github.com/crewAIInc/crewAI/issues/4511 is resolved
  ; crewai pins older OTel versions, reinstall ADOT to restore ours
  pip install {toxinidir}/aws-opentelemetry-distro
commands =
  {env:COVERAGE_RUN} -m pytest amazon/opentelemetry/distro/instrumentation/crewai -ra {posargs}

[testenv:3.{10,11,12,13,14}-test-aws-opentelemetry-distro-llama-index]
deps =
  {[testenv]deps}
  llama-index-core >= 0.10.44, < 1
  llama-index-llms-openai
  llama-index-llms-anthropic
  llama-index-llms-azure-openai
  llama-index-llms-bedrock-converse
  llama-index-llms-vertex
changedir = {[testenv]changedir}
commands =
  {env:COVERAGE_RUN} -m pytest amazon/opentelemetry/distro/instrumentation/llama_index -ra {posargs}

[testenv:3.{10,11,12,13,14}-test-aws-opentelemetry-distro-mcp]
deps =
  {[testenv]deps}
  mcp >= 1.8.1, < 2
  uvicorn
changedir = {[testenv]changedir}
commands =
  {env:COVERAGE_RUN} -m pytest amazon/opentelemetry/distro/instrumentation/mcp -ra {posargs}

[testenv:3.{10,11,12,13,14}-test-aws-opentelemetry-distro-openai-agents]
deps =
  {[testenv]deps}
  openai-agents >= 0.3.3
changedir = {[testenv]changedir}
commands =
  {env:COVERAGE_RUN} -m pytest amazon/opentelemetry/distro/instrumentation/openai_agents -ra {posargs}

[testenv:spellcheck]
basepython: python3
recreate = True
deps =
  codespell

commands =
  codespell

[testenv:lint]
basepython: python3
recreate = True
deps =
  -r dev-requirements.txt

commands =
  python scripts/eachdist.py lint --check-only
