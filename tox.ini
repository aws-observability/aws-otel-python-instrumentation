[tox]
isolated_build = True
skipsdist = True
skip_missing_interpreters = True
envlist =
    ; aws-opentelemetry-application-signals (base package)
    3.{10,11,12,13,14}-test-aws-opentelemetry-application-signals
    ; aws-opentelemetry-serviceevents
    3.{10,11,12,13,14}-test-aws-opentelemetry-serviceevents
    ; aws-opentelemetry-distro
    3.{10,11,12,13,14}-test-aws-opentelemetry-distro
    3.{10,11,12,13,14}-test-aws-opentelemetry-distro-langchain-{oldest,latest}
    ; crewai does not support Python 3.14 yet
    3.{10,11,12,13}-test-aws-opentelemetry-distro-crewai-{oldest,latest}
    3.{10,11,12,13,14}-test-aws-opentelemetry-distro-llama-index-{oldest,latest}
    3.{10,11,12,13,14}-test-aws-opentelemetry-distro-mcp-{oldest,latest}
    3.{10,11,12,13,14}-test-aws-opentelemetry-distro-openai-agents-{oldest,latest}
    ; intentionally excluded from pypy3 since we use grpc in aws-opentelemetry-distro, but pypy3 doesn't support grpc

    lint
    spellcheck

[testenv]
deps =
  -c dev-requirements.txt
  test: pytest
  test: pytest-cov
  test: jsonschema
  test: fastapi
  test: starlette
  test: flask
  test: django
  test: httpx

passenv =
  ADOT_WHEEL

setenv =
  CORE_REPO=git+https://github.com/open-telemetry/opentelemetry-python.git@release/v1.42.x-0.63bx
  CONTRIB_REPO=git+https://github.com/open-telemetry/opentelemetry-python-contrib.git@release/v1.42.x-0.63bx

changedir =
  test-aws-opentelemetry-distro: aws-opentelemetry-distro/tests
  test-aws-opentelemetry-application-signals: aws-opentelemetry-application-signals/tests
  test-aws-opentelemetry-serviceevents: aws-opentelemetry-serviceevents/tests

commands_pre =
; Install without -e to test the actual installation
  3.{10,11,12,13,14}: python -m pip install -U pip setuptools wheel
; Install common packages for all the tests. These are not needed in all the
; cases but it saves a lot of boilerplate in this file.
  test: pip install botocore
  test: pip install opentelemetry-api[test]@{env:CORE_REPO}\#egg=opentelemetry-api&subdirectory=opentelemetry-api
  test: pip install opentelemetry-sdk[test]@{env:CORE_REPO}\#egg=opentelemetry-sdk&subdirectory=opentelemetry-sdk
  test: pip install opentelemetry-instrumentation[test]@{env:CONTRIB_REPO}\#egg=opentelemetry-instrumentation&subdirectory=opentelemetry-instrumentation
  test: pip install opentelemetry-exporter-otlp[test]@{env:CORE_REPO}\#egg=opentelemetry-exporter-otlp&subdirectory=exporter/opentelemetry-exporter-otlp
  test: pip install opentelemetry-test-utils@{env:CORE_REPO}\#egg=opentelemetry-test-utils&subdirectory=tests/opentelemetry-test-utils
  aws-opentelemetry-distro: pip install {env:ADOT_WHEEL:{toxinidir}/aws-opentelemetry-distro} --find-links {toxinidir}/dist
  aws-opentelemetry-distro: pip install --force-reinstall --no-deps {env:ADOT_WHEEL:{toxinidir}/aws-opentelemetry-distro}
  test-aws-opentelemetry-application-signals: pip install {toxinidir}/aws-opentelemetry-application-signals
  test-aws-opentelemetry-serviceevents: pip install {toxinidir}/aws-opentelemetry-application-signals
  test-aws-opentelemetry-serviceevents: pip install {toxinidir}/aws-opentelemetry-serviceevents

commands =
  test-aws-opentelemetry-distro: pytest --cov={envsitepackagesdir}/amazon/opentelemetry/distro --cov-config={toxinidir}/aws-opentelemetry-distro/.coveragerc --ignore=amazon/opentelemetry/distro/instrumentation/langchain --ignore=amazon/opentelemetry/distro/instrumentation/crewai --ignore=amazon/opentelemetry/distro/instrumentation/llama_index --ignore=amazon/opentelemetry/distro/instrumentation/mcp --ignore=amazon/opentelemetry/distro/instrumentation/openai_agents -ra {posargs}
  test-aws-opentelemetry-application-signals: pytest --cov={envsitepackagesdir}/amazon/opentelemetry/application_signals --cov-config={toxinidir}/aws-opentelemetry-application-signals/.coveragerc application_signals/ -ra {posargs}
  test-aws-opentelemetry-serviceevents: pytest --cov={envsitepackagesdir}/amazon/opentelemetry/serviceevents --cov-config={toxinidir}/aws-opentelemetry-serviceevents/.coveragerc serviceevents/ -ra {posargs}

[testenv:3.{10,11,12,13,14}-test-aws-opentelemetry-distro-langchain-{oldest,latest}]
deps =
  {[testenv]deps}
  aws-opentelemetry-distro-langchain-oldest: -r {toxinidir}/aws-opentelemetry-distro/tests/amazon/opentelemetry/distro/instrumentation/langchain/requirements.oldest.txt
  aws-opentelemetry-distro-langchain-latest: -r {toxinidir}/aws-opentelemetry-distro/tests/amazon/opentelemetry/distro/instrumentation/langchain/requirements.latest.txt
changedir = {[testenv]changedir}
commands =
  pytest --cov={envsitepackagesdir}/amazon/opentelemetry/distro --cov-config={toxinidir}/aws-opentelemetry-distro/.coveragerc amazon/opentelemetry/distro/instrumentation/langchain -ra {posargs}

[testenv:3.{10,11,12,13}-test-aws-opentelemetry-distro-crewai-{oldest,latest}]
deps =
  {[testenv]deps}
  aws-opentelemetry-distro-crewai-oldest: -r {toxinidir}/aws-opentelemetry-distro/tests/amazon/opentelemetry/distro/instrumentation/crewai/requirements.oldest.txt
  aws-opentelemetry-distro-crewai-latest: -r {toxinidir}/aws-opentelemetry-distro/tests/amazon/opentelemetry/distro/instrumentation/crewai/requirements.latest.txt
changedir = {[testenv]changedir}
commands_pre =
  {[testenv]commands_pre}
  ; TODO: remove once https://github.com/crewAIInc/crewAI/issues/4511 is resolved
  ; crewai pins older OTel versions, reinstall ADOT to restore ours
  pip install --force-reinstall --no-deps {env:ADOT_WHEEL:{toxinidir}/aws-opentelemetry-distro}
commands =
  pytest --cov={envsitepackagesdir}/amazon/opentelemetry/distro --cov-config={toxinidir}/aws-opentelemetry-distro/.coveragerc amazon/opentelemetry/distro/instrumentation/crewai -ra {posargs}

[testenv:3.{10,11,12,13,14}-test-aws-opentelemetry-distro-llama-index-{oldest,latest}]
deps =
  {[testenv]deps}
  aws-opentelemetry-distro-llama-index-oldest: -r {toxinidir}/aws-opentelemetry-distro/tests/amazon/opentelemetry/distro/instrumentation/llama_index/requirements.oldest.txt
  aws-opentelemetry-distro-llama-index-latest: -r {toxinidir}/aws-opentelemetry-distro/tests/amazon/opentelemetry/distro/instrumentation/llama_index/requirements.latest.txt
changedir = {[testenv]changedir}
commands =
  pytest --cov={envsitepackagesdir}/amazon/opentelemetry/distro --cov-config={toxinidir}/aws-opentelemetry-distro/.coveragerc amazon/opentelemetry/distro/instrumentation/llama_index -ra {posargs}

[testenv:3.{10,11,12,13,14}-test-aws-opentelemetry-distro-mcp-{oldest,latest}]
deps =
  {[testenv]deps}
  aws-opentelemetry-distro-mcp-oldest: -r {toxinidir}/aws-opentelemetry-distro/tests/amazon/opentelemetry/distro/instrumentation/mcp/requirements.oldest.txt
  aws-opentelemetry-distro-mcp-latest: -r {toxinidir}/aws-opentelemetry-distro/tests/amazon/opentelemetry/distro/instrumentation/mcp/requirements.latest.txt
changedir = {[testenv]changedir}
commands =
  pytest --cov={envsitepackagesdir}/amazon/opentelemetry/distro --cov-config={toxinidir}/aws-opentelemetry-distro/.coveragerc amazon/opentelemetry/distro/instrumentation/mcp -ra {posargs}

[testenv:3.{10,11,12,13,14}-test-aws-opentelemetry-distro-openai-agents-{oldest,latest}]
deps =
  {[testenv]deps}
  aws-opentelemetry-distro-openai-agents-oldest: -r {toxinidir}/aws-opentelemetry-distro/tests/amazon/opentelemetry/distro/instrumentation/openai_agents/requirements.oldest.txt
  aws-opentelemetry-distro-openai-agents-latest: -r {toxinidir}/aws-opentelemetry-distro/tests/amazon/opentelemetry/distro/instrumentation/openai_agents/requirements.latest.txt
changedir = {[testenv]changedir}
commands =
  pytest --cov={envsitepackagesdir}/amazon/opentelemetry/distro --cov-config={toxinidir}/aws-opentelemetry-distro/.coveragerc amazon/opentelemetry/distro/instrumentation/openai_agents -ra {posargs}

[testenv:spellcheck]
basepython: python3
recreate = True
deps =
  codespell

commands =
  codespell

[testenv:lint]
basepython: python3
recreate = True
deps =
  -r dev-requirements.txt

commands =
  python scripts/eachdist.py lint --check-only
